<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cell Division — Mitosis & Meiosis</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: 'Nunito', sans-serif;
    }

    #app {
      position: fixed;
      inset: 0;
      background: linear-gradient(160deg, #6ecbff 0%, #b388ff 45%, #ff8dc7 100%);
    }

    #canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    .overlay {
      position: absolute;
      left: 0; right: 0;
      z-index: 10;
      pointer-events: none;
    }

    .overlay > * { pointer-events: auto; }

    .overlay-top {
      top: 0;
      padding: 14px 18px 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .title-badge {
      background: #fff;
      border: 4px solid #ff6b9d;
      border-radius: 999px;
      padding: 8px 28px;
      font-family: 'Fredoka', sans-serif;
      font-size: clamp(1.1rem, 3vw, 1.65rem);
      font-weight: 700;
      color: #ff3d7f;
      box-shadow: 0 6px 0 #e0356f, 0 8px 24px rgba(0,0,0,0.15);
      text-shadow: 1px 1px 0 rgba(255,255,255,0.8);
    }

    .mode-tabs {
      display: flex;
      gap: 10px;
    }

    .mode-tab {
      padding: 10px 22px;
      border: 3px solid #fff;
      border-radius: 999px;
      font-family: 'Fredoka', sans-serif;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 0 rgba(0,0,0,0.12);
    }

    .mode-tab:active { transform: translateY(3px); box-shadow: none; }

    .mode-tab[data-mode="mitosis"] {
      background: #7bed9f;
      color: #1a7a3a;
    }

    .mode-tab[data-mode="meiosis"] {
      background: #ffa502;
      color: #8a4f00;
    }

    .mode-tab.active {
      transform: scale(1.08);
      box-shadow: 0 0 0 4px #fff, 0 6px 0 rgba(0,0,0,0.15);
    }

    .phase-card {
      background: rgba(255,255,255,0.92);
      border: 3px solid #fff;
      border-radius: 20px;
      padding: 10px 24px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
      max-width: 90vw;
    }

    #phase-name {
      font-family: 'Fredoka', sans-serif;
      font-size: clamp(1.2rem, 3.5vw, 1.8rem);
      font-weight: 700;
      color: #5f27cd;
      display: block;
    }

    #phase-sub {
      font-size: 0.85rem;
      font-weight: 700;
      color: #8395a7;
      display: block;
      margin-top: 2px;
    }

    .overlay-bottom {
      bottom: 0;
      padding: 0 14px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .info-panel {
      background: rgba(255,255,255,0.93);
      border: 3px solid #fff;
      border-radius: 18px;
      padding: 12px 18px;
      max-width: 720px;
      width: 100%;
      font-size: 0.88rem;
      line-height: 1.55;
      color: #2d3436;
      box-shadow: 0 8px 28px rgba(0,0,0,0.1);
      max-height: 80px;
      overflow-y: auto;
    }

    .info-panel strong { color: #ff3d7f; }

    .controls {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      padding: 11px 20px;
      border: 3px solid #fff;
      border-radius: 14px;
      font-family: 'Fredoka', sans-serif;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      box-shadow: 0 5px 0 rgba(0,0,0,0.15);
      transition: transform 0.1s;
    }

    .btn:active:not(:disabled) { transform: translateY(4px); box-shadow: none; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-play {
      background: #2ed573;
      color: #fff;
      min-width: 110px;
      font-size: 1.05rem;
    }

    .btn-play.playing { background: #ff6b81; }

    .btn-nav { background: #fff; color: #576574; }
    .btn-next { background: #54a0ff; color: #fff; }

    .step-counter {
      background: #fff;
      border-radius: 10px;
      padding: 8px 14px;
      font-weight: 800;
      color: #5f27cd;
      font-size: 0.85rem;
      border: 2px solid #dfe6e9;
    }

    .stage-bar {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .stage-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: rgba(255,255,255,0.5);
      border: 2px solid #fff;
      cursor: pointer;
      transition: transform 0.2s, background 0.2s;
    }

    .stage-dot.done { background: #7bed9f; }
    .stage-dot.active {
      background: #ff6b9d;
      transform: scale(1.45);
      box-shadow: 0 0 10px #ff6b9d;
    }

    .progress-bar {
      width: min(420px, 80vw);
      height: 8px;
      background: rgba(255,255,255,0.45);
      border-radius: 999px;
      overflow: hidden;
      border: 2px solid #fff;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #7bed9f, #ff6b9d);
      border-radius: 999px;
      transition: width 0.1s linear;
      width: 0%;
    }
  </style>
</head>
<body>
<div id="app">
  <canvas id="canvas"></canvas>

  <div class="overlay overlay-top">
    <div class="title-badge">🧬 Cell Division Adventure!</div>
    <div class="mode-tabs">
      <button class="mode-tab active" data-mode="mitosis">Mitosis</button>
      <button class="mode-tab" data-mode="meiosis">Meiosis</button>
    </div>
    <div class="phase-card">
      <span id="phase-name">Interphase</span>
      <span id="phase-sub">Cell grows &amp; DNA replicates</span>
    </div>
  </div>

  <div class="overlay overlay-bottom">
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    <div class="stage-bar" id="stage-bar"></div>
    <div class="info-panel" id="info-panel"></div>
    <div class="controls">
      <button class="btn btn-play" id="btn-play">▶ Play</button>
      <button class="btn btn-nav" id="btn-prev" disabled>◀ Prev</button>
      <span class="step-counter" id="step-counter">1 / 7</span>
      <button class="btn btn-next" id="btn-next">Next ▶</button>
      <button class="btn btn-nav" id="btn-reset">↺ Reset</button>
    </div>
  </div>
</div>

<script>
/* ================================================================
   STAGE METADATA
   ================================================================ */
const MITOSIS_META = [
  { name: 'Interphase', sub: 'Cell grows & DNA replicates',
    info: '<strong>Interphase</strong> — The cell grows and copies its DNA. Each chromosome now has two <strong>sister chromatids</strong> joined together!' },
  { name: 'Prophase', sub: 'Chromosomes appear!',
    info: '<strong>Prophase</strong> — Chromosomes become visible! The nucleus breaks apart and spindles start forming at each end.' },
  { name: 'Metaphase', sub: 'Chromosomes line up in the middle',
    info: '<strong>Metaphase</strong> — All chromosomes line up at the middle of the cell like soldiers on a parade line!' },
  { name: 'Anaphase', sub: 'Chromosomes pull apart!',
    info: '<strong>Anaphase</strong> — Sister chromatids are pulled to opposite sides of the cell. Watch them zoom apart!' },
  { name: 'Telophase', sub: 'Two new nuclei form',
    info: '<strong>Telophase</strong> — Two brand-new nuclei form, one at each end. The cell is almost ready to split!' },
  { name: 'Cytokinesis', sub: 'The cell pinches in two!',
    info: '<strong>Cytokinesis</strong> — The cell membrane pinches inward like a drawstring bag until — POP — two cells!' },
  { name: 'Complete!', sub: 'Two identical daughter cells',
    info: '🎉 <strong>Mitosis complete!</strong> Two identical cells, ready to grow and do it all again!' }
];

const MEIOSIS_META = [
  { name: 'Interphase', sub: 'DNA copies before meiosis',
    info: '<strong>Interphase</strong> — DNA replicates. The cell has matching <strong>homologous pairs</strong> from mom and dad.' },
  { name: 'Prophase I', sub: 'Pairs swap DNA!',
    info: '<strong>Prophase I</strong> — Homologous pairs link up and swap pieces of DNA. This is <strong>crossing over</strong> — it makes you unique!' },
  { name: 'Metaphase I', sub: 'Pairs line up in the middle',
    info: '<strong>Metaphase I</strong> — Homologous <em>pairs</em> (not individual chromosomes) line up at the center.' },
  { name: 'Anaphase I', sub: 'Pairs pull apart!',
    info: '<strong>Anaphase I</strong> — Homologous chromosomes separate. Sister chromatids stay together — that\'s the big difference from mitosis!' },
  { name: 'Telophase I', sub: 'First split — 2 cells!',
    info: '<strong>Telophase I</strong> — The cell divides into <strong>two haploid cells</strong>. Meiosis II is next!' },
  { name: 'Prophase II', sub: 'Spindles form again',
    info: '<strong>Prophase II</strong> — In each cell, new spindles form. No more DNA copying!' },
  { name: 'Metaphase II', sub: 'Chromosomes line up again',
    info: '<strong>Metaphase II</strong> — Chromosomes line up at the middle in both cells at once.' },
  { name: 'Anaphase II', sub: 'Sisters separate!',
    info: '<strong>Anaphase II</strong> — Sister chromatids finally pull apart in both cells!' },
  { name: 'Telophase II', sub: 'Four cells form!',
    info: '<strong>Telophase II</strong> — Four cells pinching apart — each one becomes a unique gamete!' },
  { name: 'Complete!', sub: 'Four unique gametes',
    info: '🎉 <strong>Meiosis complete!</strong> Four unique haploid cells — sperm or egg — each genetically different!' }
];

/* ================================================================
   SCENE KEYFRAMES  (all coords normalized 0–1 of canvas)

   cellCount: 1, 2, or 4
   ================================================================ */
function K(p) { return p; } // shorthand

           K({x:0.44,y:0.56,a:10,s:0.85,c:2,p:1,xo:0}),K({x:0.57,y:0.57,a:-15,s:0.85,c:3,p:1,xo:0})],

           K({x:0.5,y:0.56,a:0,s:0.9,c:2,p:0,xo:0,sp:0.26}),K({x:0.5,y:0.64,a:0,s:0.9,c:3,p:0,xo:0,sp:0.26})],

    centro:[K({x:0.08,y:0.5,op:0}),K({x:0.92,y:0.5,op:0})], furrow:0.75 },

  { pinch:1, sep:0.22, cellRX:0.19, cellRY:0.22,
    nuc:[K({x:0.28,y:0.5,rx:0.08,ry:0.06,op:1}),K({x:0.72,y:0.5,rx:0.08,ry:0.06,op:1})],
    chrom:[K({x:0.24,y:0.46,a:0,s:0.6,c:0,p:0,xo:0}),K({x:0.76,y:0.46,a:0,s:0.6,c:1,p:0,xo:0}),
           K({x:0.24,y:0.54,a:0,s:0.6,c:2,p:0,xo:0}),K({x:0.76,y:0.54,a:0,s:0.6,c:3,p:0,xo:0})],
    centro:[K({x:0.08,y:0.5,op:0}),K({x:0.92,y:0.5,op:0})], furrow:0 }

    chrom:[K({x:0.16,y:0.46,a:0,s:0.55,c:0,p:0,xo:0}),K({x:0.36,y:0.46,a:0,s:0.55,c:1,p:0,xo:0}),
           K({x:0.64,y:0.46,a:0,s:0.55,c:2,p:0,xo:0}),K({x:0.84,y:0.46,a:0,s:0.55,c:3,p:0,xo:0})],

// pad older mitosis chrom entries with split:0
MITOSIS_KF.forEach(kf => kf.chrom.forEach(c => { if (c.sp === undefined) c.sp = 0; }));

/* ================================================================
   CHROMATIN & SEEDED RANDOM
   ================================================================ */
const CHROMATIN_THREADS = [];
let chromatinSeed = 777;
function seededRandom() {
  let x = Math.sin(chromatinSeed++) * 10000;
  return x - Math.floor(x);
}
// Generate 40 wavy threads inside a unit circle
for (let i = 0; i < 40; i++) {
  let r1 = seededRandom() * 0.85;
  let theta1 = seededRandom() * Math.PI * 2;
  let x1 = Math.cos(theta1) * r1;
  let y1 = Math.sin(theta1) * r1;

  let r2 = seededRandom() * 0.85;
  let theta2 = seededRandom() * Math.PI * 2;
  let x2 = Math.cos(theta2) * r2;
  let y2 = Math.sin(theta2) * r2;

  let cx1 = x1 + (seededRandom() - 0.5) * 0.4;
  let cy1 = y1 + (seededRandom() - 0.5) * 0.4;
  let cx2 = x2 + (seededRandom() - 0.5) * 0.4;
  let cy2 = y2 + (seededRandom() - 0.5) * 0.4;

  let colorIdx = Math.floor(seededRandom() * 4);
  CHROMATIN_THREADS.push({ x1, y1, x2, y2, cx1, cy1, cx2, cy2, colorIdx });
}

/* ================================================================
   MATH / INTERPOLATION
   ================================================================ */
const lerp = (a, b, t) => a + (b - a) * t;
const easeInOut = t => t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2, 3)/2;
const easeOutBack = t => { const c = 1.70158; return 1 + (c+1)*Math.pow(t-1,3) + c*Math.pow(t-1,2); };

function padChrom(arr, n) {
  const out = arr.slice();
  while (out.length < n) out.push({ x:0.5,y:0.5,a:0,s:0,c:0,p:1,xo:0,co:0,sp:0,op:0 });
  return out;
}

function padNuc(arr, n) {
  const out = arr.slice();
  while (out.length < n) out.push({ x:0.5,y:0.5,rx:0,ry:0,op:0 });
  return out;
}

function cloneKF(kf) {
  return JSON.parse(JSON.stringify(kf));
}

function lerpKF(a, b, t) {
  const e = easeInOut(t);
  const r = {
    pinch: lerp(a.pinch, b.pinch, e),
    sep: lerp(a.sep ?? 0, b.sep ?? 0, e),
    cellRX: lerp(a.cellRX, b.cellRX, e),
    cellRY: lerp(a.cellRY, b.cellRY, e),
    furrow: lerp(a.furrow ?? 0, b.furrow ?? 0, e),
    quadSplit: lerp(a.quadSplit ?? 0, b.quadSplit ?? 0, easeOutBack(Math.min(1,t*1.2))),
    cellCount: t > 0.5 ? (b.cellCount ?? 1) : (a.cellCount ?? 1),
  };

  const maxChrom = Math.max(a.chrom?.length||0, b.chrom?.length||0, 8);
  const ca = padChrom(a.chrom||[], maxChrom);
  const cb = padChrom(b.chrom||[], maxChrom);
  r.chrom = ca.map((c, i) => {
    const d = cb[i];
    const ct = d.op !== undefined ? lerp(c.op??1, d.op??1, e) : 1;
    return {
      x: lerp(c.x, d.x, e), y: lerp(c.y, d.y, e),
      a: lerp(c.a, d.a, e), s: lerp(c.s, d.s, e),
      c: t > 0.5 ? d.c : c.c,
      p: lerp(c.p ?? 1, d.p ?? 1, e),
      xo: lerp(c.xo ?? 0, d.xo ?? 0, e),
      co: lerp(c.co??0, d.co??0, e),
      sp: lerp(c.sp??0, d.sp??0, e),
      op: ct,
    };
  });

  const maxNuc = Math.max(a.nuc?.length||0, b.nuc?.length||0, 4);
  const na = padNuc(a.nuc||[], maxNuc);
  const nb = padNuc(b.nuc||[], maxNuc);
  r.nuc = na.map((n, i) => ({
    x: lerp(n.x, nb[i].x, e), y: lerp(n.y, nb[i].y, e),
    rx: lerp(n.rx, nb[i].rx, e), ry: lerp(n.ry, nb[i].ry, e),
    op: lerp(n.op, nb[i].op, e),
  }));

  r.centro = (a.centro||[]).map((c,i) => ({
    x: lerp(c.x, (b.centro||[])[i]?.x ?? c.x, e),
    y: lerp(c.y, (b.centro||[])[i]?.y ?? c.y, e),
    op: lerp(c.op, (b.centro||[])[i]?.op ?? 0, e),
  }));

  return r;
}

/* ================================================================
   CANVAS DRAWING
   ================================================================ */
function resize() {
  canvas.width = window.innerWidth * devicePixelRatio;
  canvas.height = window.innerHeight * devicePixelRatio;
  canvas.style.width = window.innerWidth + 'px';
  canvas.style.height = window.innerHeight + 'px';
  ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
  initBubbles();
}

function initBubbles() {
  bubbles = Array.from({ length: 18 }, () => ({
    x: Math.random(), y: Math.random(),
    r: 8 + Math.random() * 28,
    speed: 0.0003 + Math.random() * 0.0008,
    hue: Math.random() * 60 + 180,
  }));
}

function drawBackground(w, h, t) {
  const g = ctx.createLinearGradient(0, 0, w, h);
  g.addColorStop(0, '#74ebd5');
  g.addColorStop(0.35, '#88c8ff');
  g.addColorStop(0.65, '#caa0ff');
  g.addColorStop(1, '#ffb3d9');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, w, h);

  bubbles.forEach((b, i) => {
    b.y -= b.speed;
    if (b.y < -0.05) { b.y = 1.05; b.x = Math.random(); }
    const bx = b.x * w + Math.sin(t * 0.001 + i) * 12;
    const by = b.y * h;
    ctx.beginPath();
    ctx.arc(bx, by, b.r, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${b.hue}, 90%, 75%, 0.18)`;
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.35)';
    ctx.lineWidth = 2;
    ctx.stroke();
  });
}

function drawCellBlob(cx, cy, rx, ry, fillHue) {
  if (rx < 1 || ry < 1) return;
  // Cytoplasm Gradient (semi-transparent soft textbook colors)
  const grad = ctx.createRadialGradient(cx, cy, rx * 0.1, cx, cy, rx * 1.15);
  grad.addColorStop(0, `hsla(${fillHue}, 90%, 94%, 0.82)`);
  grad.addColorStop(0.65, `hsla(${fillHue + 8}, 85%, 85%, 0.72)`);
  grad.addColorStop(1, `hsla(${fillHue + 15}, 70%, 75%, 0.60)`);
  
  ctx.beginPath();
  ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
  ctx.fillStyle = grad;
  ctx.fill();
  
  // Double membrane (Phospholipid bilayer representation)
  // Outer membrane leaflet
  ctx.lineWidth = 3.2;
  ctx.strokeStyle = '#2c3e50';
  ctx.stroke();
  
  // White separator spacer
  ctx.lineWidth = 1.8;
  ctx.strokeStyle = '#ffffff';
  ctx.stroke();
  
  // Inner membrane leaflet
  const irx = Math.max(0, rx - 3.5), iry = Math.max(0, ry - 3.5);
  if (irx > 0 && iry > 0) {
    ctx.beginPath();
    ctx.ellipse(cx, cy, irx, iry, 0, 0, Math.PI * 2);
    ctx.lineWidth = 1.0;
    ctx.strokeStyle = '#2c3e50';
    ctx.stroke();
  }
}

function drawPinchingCell(w, h, sc) {
  const cx = w * 0.5, cy = h * 0.5;
  const baseRX = sc.cellRX * w;
  const baseRY = sc.cellRY * h;
  const pinch = sc.pinch;
  const sep = sc.sep * w;
  const hue = mode === 'mitosis' ? 330 : 25;

  if (sc.quadSplit > 0.01) {
    drawFourCells(w, h, sc, hue);
    return;
  }

  if (pinch < 0.02 && (sc.cellCount ?? 1) <= 1) {
    drawCellBlob(cx, cy, baseRX, baseRY, hue);
    return;
  }

  if (pinch > 0.98) {
    const leftX = cx - sep;
    const rightX = cx + sep;
    const rxa = baseRX * 0.58;
    drawCellBlob(leftX, cy, rxa, baseRY * 0.95, hue);
    drawCellBlob(rightX, cy, rxa, baseRY * 0.95, hue + 8);
    return;
  }

  const easePinch = easeInOut(pinch);
  const leftX = cx - sep * easePinch;
  const rightX = cx + sep * easePinch;
  const blobRX = baseRX * (0.55 + 0.45 * (1 - easePinch * 0.5));
  const bridge = baseRX * 0.35 * (1 - easePinch);

  // Fill the cell lobes
  const leftGrad = ctx.createRadialGradient(leftX, cy, blobRX * 0.1, leftX, cy, blobRX * 1.15);
  leftGrad.addColorStop(0, `hsla(${hue}, 90%, 94%, 0.82)`);
  leftGrad.addColorStop(0.65, `hsla(${hue + 8}, 85%, 85%, 0.72)`);
  leftGrad.addColorStop(1, `hsla(${hue + 15}, 70%, 75%, 0.60)`);

  const rightGrad = ctx.createRadialGradient(rightX, cy, blobRX * 0.1, rightX, cy, blobRX * 1.15);
  rightGrad.addColorStop(0, `hsla(${hue + 8}, 90%, 94%, 0.82)`);
  rightGrad.addColorStop(0.65, `hsla(${hue + 16}, 85%, 85%, 0.72)`);
  rightGrad.addColorStop(1, `hsla(${hue + 23}, 70%, 75%, 0.60)`);

  // Draw fills
  ctx.beginPath();
  ctx.ellipse(leftX, cy, blobRX, baseRY * 0.96, 0, 0, Math.PI * 2);
  ctx.fillStyle = leftGrad;
  ctx.fill();

  ctx.beginPath();
  ctx.ellipse(rightX, cy, blobRX, baseRY * 0.96, 0, 0, Math.PI * 2);
  ctx.fillStyle = rightGrad;
  ctx.fill();

  // Draw bridge fill
  if (bridge > 2) {
    ctx.beginPath();
    ctx.moveTo(leftX + blobRX * 0.3, cy - baseRY * 0.5);
    ctx.quadraticCurveTo(cx, cy - bridge * 0.8, rightX - blobRX * 0.3, cy - baseRY * 0.5);
    ctx.lineTo(rightX - blobRX * 0.3, cy + baseRY * 0.5);
    ctx.quadraticCurveTo(cx, cy + bridge * 0.8, leftX + blobRX * 0.3, cy + baseRY * 0.5);
    ctx.closePath();
    ctx.fillStyle = `hsla(${hue}, 85%, 82%, 0.75)`;
    ctx.fill();
  }

  // Draw cell lobes outlines (outer leaflets only)
  ctx.lineWidth = 3.2;
  ctx.strokeStyle = '#2c3e50';
  
  ctx.beginPath();
  ctx.ellipse(leftX, cy, blobRX, baseRY * 0.96, 0, 0, Math.PI * 2);
  ctx.stroke();

  ctx.beginPath();
  ctx.ellipse(rightX, cy, blobRX, baseRY * 0.96, 0, 0, Math.PI * 2);
  ctx.stroke();

  // Draw cell lobes white inner leaflet spacers
  ctx.lineWidth = 1.8;
  ctx.strokeStyle = '#ffffff';
  ctx.stroke();
  ctx.beginPath();
  ctx.ellipse(leftX, cy, blobRX, baseRY * 0.96, 0, 0, Math.PI * 2);
  ctx.stroke();

  // Draw cell lobes inner leaflets
  const ilRX = Math.max(0, blobRX - 3.5), ilRY = Math.max(0, baseRY * 0.96 - 3.5);
  if (ilRX > 0 && ilRY > 0) {
    ctx.lineWidth = 1.0;
    ctx.strokeStyle = '#2c3e50';
    ctx.beginPath();
    ctx.ellipse(leftX, cy, ilRX, ilRY, 0, 0, Math.PI * 2);
    ctx.stroke();
    ctx.beginPath();
    ctx.ellipse(rightX, cy, ilRX, ilRY, 0, 0, Math.PI * 2);
    ctx.stroke();
  }

  // Cover internal lines with bridge fill and draw bridge outlines
  if (bridge > 2) {
    // Redraw bridge fill on top of cell outlines to hide internal segments
    ctx.beginPath();
    ctx.moveTo(leftX + blobRX * 0.28, cy - baseRY * 0.45);
    ctx.quadraticCurveTo(cx, cy - bridge * 0.8, rightX - blobRX * 0.28, cy - baseRY * 0.45);
    ctx.lineTo(rightX - blobRX * 0.28, cy + baseRY * 0.45);
    ctx.quadraticCurveTo(cx, cy + bridge * 0.8, leftX + blobRX * 0.28, cy + baseRY * 0.45);
    ctx.closePath();
    ctx.fillStyle = `hsla(${hue}, 85%, 82%, 1.0)`;
    ctx.fill();

    // Draw bridge top and bottom outlines
    // Top outer border
    ctx.lineWidth = 3.2;
    ctx.strokeStyle = '#2c3e50';
    ctx.beginPath();
    ctx.moveTo(leftX + blobRX * 0.28, cy - baseRY * 0.48);
    ctx.quadraticCurveTo(cx, cy - bridge * 0.8, rightX - blobRX * 0.28, cy - baseRY * 0.48);
    ctx.stroke();
    // Top white spacer
    ctx.lineWidth = 1.8;
    ctx.strokeStyle = '#ffffff';
    ctx.stroke();
    // Top inner border
    ctx.lineWidth = 1.0;
    ctx.strokeStyle = '#2c3e50';
    ctx.beginPath();
    ctx.moveTo(leftX + blobRX * 0.28, cy - baseRY * 0.48 + 3.5);
    ctx.quadraticCurveTo(cx, cy - bridge * 0.8 + 3.5, rightX - blobRX * 0.28, cy - baseRY * 0.48 + 3.5);
    ctx.stroke();

    // Bottom outer border
    ctx.lineWidth = 3.2;
    ctx.strokeStyle = '#2c3e50';
    ctx.beginPath();
    ctx.moveTo(leftX + blobRX * 0.28, cy + baseRY * 0.48);
    ctx.quadraticCurveTo(cx, cy + bridge * 0.8, rightX - blobRX * 0.28, cy + baseRY * 0.48);
    ctx.stroke();
    // Bottom white spacer
    ctx.lineWidth = 1.8;
    ctx.strokeStyle = '#ffffff';
    ctx.stroke();
    // Bottom inner border
    ctx.lineWidth = 1.0;
    ctx.strokeStyle = '#2c3e50';
    ctx.beginPath();
    ctx.moveTo(leftX + blobRX * 0.28, cy + baseRY * 0.48 - 3.5);
    ctx.quadraticCurveTo(cx, cy + bridge * 0.8 - 3.5, rightX - blobRX * 0.28, cy + baseRY * 0.48 - 3.5);
    ctx.stroke();
  }

  // cleavage furrow line (microfilaments)
  if (sc.furrow > 0.01) {
    const depth = sc.furrow * baseRY * 0.55;
    ctx.beginPath();
    ctx.moveTo(cx - blobRX * 0.35, cy);
    ctx.quadraticCurveTo(cx, cy + depth, cx + blobRX * 0.35, cy);
    ctx.lineWidth = 3 + sc.furrow * 2;
    ctx.strokeStyle = '#e84393';
    ctx.lineCap = 'round';
    ctx.stroke();
  }
}

function drawFourCells(w, h, sc, hue) {
  const cy = h * 0.5;
  const qs = easeOutBack(Math.min(1, sc.quadSplit));
  const positions = [0.16, 0.38, 0.62, 0.84];
  const startPositions = [0.30, 0.30, 0.70, 0.70];
  const rx = sc.cellRX * w * 0.38;
  const ry = sc.cellRY * h * 0.75;

  positions.forEach((endX, i) => {
    const x = lerp(startPositions[i], endX, qs) * w;
    drawCellBlob(x, cy, rx * (0.7 + qs * 0.3), ry * (0.7 + qs * 0.3), hue + i * 12);
  });
}

function drawNucleus(w, h, n) {
  if (n.op < 0.02) return;
  const cx = n.x * w, cy = n.y * h;
  const rx = n.rx * w, ry = n.ry * h;
  if (rx < 1 || ry < 1) return;
  ctx.globalAlpha = n.op;
  
  // Fill nucleus with soft transparent violet/blue
  const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(1, rx));
  g.addColorStop(0, 'rgba(235, 220, 255, 0.65)');
  g.addColorStop(1, 'rgba(190, 160, 240, 0.45)');
  ctx.beginPath();
  ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
  ctx.fillStyle = g;
  ctx.fill();
  
  // Draw chromatin threads during Interphase -> Prophase transition
  let chromatinOp = 0;
  if (step === 0) {
    chromatinOp = transitioning ? animT : 1;
  } else if (step === 1) {
    chromatinOp = transitioning ? 1 - animT : 0;
  }
  const finalChromatinOp = n.op * chromatinOp;
  if (finalChromatinOp > 0.02 && rx > 5) {
    ctx.save();
    ctx.beginPath();
    ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
    ctx.clip();
    
    ctx.globalAlpha = finalChromatinOp * 0.7;
    CHROMATIN_THREADS.forEach(t => {
      const color = CHROM_COLORS[t.colorIdx][0];
      ctx.beginPath();
      ctx.moveTo(cx + t.x1 * rx, cy + t.y1 * ry);
      ctx.bezierCurveTo(
        cx + t.cx1 * rx, cy + t.cy1 * ry,
        cx + t.cx2 * rx, cy + t.cy2 * ry,
        cx + t.x2 * rx, cy + t.y2 * ry
      );
      ctx.strokeStyle = color;
      ctx.lineWidth = 2.2;
      ctx.stroke();
    });
    ctx.restore();
  }
  
  // Reset globalAlpha for nuclear envelope borders so they match n.op
  ctx.globalAlpha = n.op;
  
  // Draw outer envelope (dashed for nuclear pores)
  ctx.lineWidth = 1.8;
  ctx.strokeStyle = '#2c3e50';
  ctx.setLineDash([7, 4]);
  ctx.beginPath();
  ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
  ctx.stroke();
  
  // Draw inner envelope (solid/fine)
  ctx.setLineDash([]);
  const irx = Math.max(0, rx - 3.5), iry = Math.max(0, ry - 2.5);
  if (irx > 0 && iry > 0) {
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.ellipse(cx, cy, irx, iry, 0, 0, Math.PI * 2);
    ctx.stroke();
  }
  
  ctx.globalAlpha = 1;
}

function drawCentrioleCylinder(x, y, angle, length, radius, color) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);
  
  // Cylinder barrel body
  ctx.fillStyle = color;
  ctx.strokeStyle = '#2c3e50';
  ctx.lineWidth = 1.5;
  
  ctx.beginPath();
  ctx.moveTo(0, -radius);
  ctx.lineTo(length, -radius);
  ctx.arc(length, 0, radius, -Math.PI / 2, Math.PI / 2);
  ctx.lineTo(0, radius);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();
  
  // Cylinder top face (ellipse at 0)
  ctx.beginPath();
  ctx.ellipse(0, 0, radius * 0.4, radius, 0, 0, Math.PI * 2);
  ctx.fillStyle = '#ffeaa7';
  ctx.fill();
  ctx.stroke();
  
  // Longitudinal lines to show microtubule triplets
  ctx.beginPath();
  for (let i = -radius + 3; i < radius; i += 3) {
    if (Math.abs(i) < radius - 1) {
      ctx.moveTo(3, i);
      ctx.lineTo(length - 3, i);
    }
  }
  ctx.strokeStyle = 'rgba(44, 62, 80, 0.3)';
  ctx.lineWidth = 1.0;
  ctx.stroke();
  
  ctx.restore();
}

function drawCentrosome(w, h, c) {
  if (c.op < 0.02) return;
  const cx = c.x * w, cy = c.y * h;
  ctx.globalAlpha = c.op;
  
  // Draw Aster (fine radiating microtubule fibers)
  ctx.beginPath();
  for (let i = 0; i < 16; i++) {
    const ang = (i / 16) * Math.PI * 2 + time * 0.0006;
    ctx.moveTo(cx + Math.cos(ang) * 10, cy + Math.sin(ang) * 10);
    ctx.lineTo(cx + Math.cos(ang) * 34, cy + Math.sin(ang) * 34);
  }
  ctx.strokeStyle = 'rgba(232, 67, 147, 0.45)';
  ctx.lineWidth = 1.2;
  ctx.stroke();
  
  // Perpendicular centrioles (T-shape)
  // Horizontal centriole
  drawCentrioleCylinder(cx - 7, cy - 3, 0, 15, 5, '#ffd32a');
  // Vertical centriole
  drawCentrioleCylinder(cx - 3, cy - 9, Math.PI / 2, 15, 5, '#ffa502');
  
  ctx.globalAlpha = 1;
}

function drawSpindles(w, h, sc) {
  const chroms = sc.chrom.filter(c => (c.op ?? 1) > 0.1);
  sc.centro.forEach(cen => {
    if (cen.op < 0.3) return;
    chroms.forEach(ch => {
      ctx.globalAlpha = cen.op * 0.4;
      ctx.beginPath();
      ctx.moveTo(cen.x * w, cen.y * h);
      ctx.lineTo(ch.x * w, ch.y * h);
      ctx.lineWidth = 1.2;
      ctx.strokeStyle = 'rgba(108, 92, 231, 0.5)'; // clean textbook purple spindle
      ctx.stroke();
      ctx.globalAlpha = 1;
    });
  });
}

function drawChromosome(w, h, ch) {
  let chromOp = 1;
  if (step === 0) {
    chromOp = transitioning ? 1 - animT : 0;
  } else if (step === 1) {
    chromOp = transitioning ? animT : 1;
  }

  const finalChOp = (ch.op ?? 1) * chromOp;
  if (finalChOp < 0.05 || ch.s < 0.05) return;
  
  const cx = ch.x * w, cy = ch.y * h;
  const colors = CHROM_COLORS[ch.c] || CHROM_COLORS[0];
  const scale = ch.s;
  const splitDist = (ch.sp ?? 0) * w;

  ctx.save();
  ctx.globalAlpha = finalChOp;
  ctx.translate(cx, cy);
  ctx.rotate(ch.a * Math.PI / 180);
  ctx.scale(scale, scale);

  if (ch.xo && ch.p) {
    // homologous pairs link up
    drawChromatidPair(-10, 0, colors[0], ch.co > 0.5, colors[1]);
    drawChromatidPair(10, 0, colors[1], ch.co > 0.5, colors[0]);
  } else if (ch.p) {
    drawChromatidPair(0, 0, colors[0], false);
  } else if (splitDist > 1) {
    ctx.save(); ctx.translate(-splitDist / scale, 0); drawSingleChromatid(0, 0, colors[0]); ctx.restore();
    ctx.save(); ctx.translate(splitDist / scale, 0); drawSingleChromatid(0, 0, colors[0]); ctx.restore();
  } else {
    drawSingleChromatid(0, 0, colors[0]);
  }

  ctx.restore();
}

function drawChromatidPair(ox, oy, color, crossover, opposingColor) {
  const h = 32, w = 7;
  ctx.lineCap = 'round';
  
  // 1. Draw outer dark outlines for both sister chromatids
  ctx.strokeStyle = '#2c3e50';
  ctx.lineWidth = 8.5;
  
  // Left sister chromatid outline
  ctx.beginPath();
  ctx.moveTo(ox - 5, oy - h/2);
  ctx.quadraticCurveTo(ox - 1.5, oy, ox - 5, oy + h/2);
  ctx.stroke();

  // Right sister chromatid outline
  ctx.beginPath();
  ctx.moveTo(ox + 5, oy - h/2);
  ctx.quadraticCurveTo(ox + 1.5, oy, ox + 5, oy + h/2);
  ctx.stroke();

  // 2. Draw inner color fills
  ctx.strokeStyle = color;
  ctx.lineWidth = 5.2;

  // Left sister fill
  ctx.beginPath();
  ctx.moveTo(ox - 5, oy - h/2);
  ctx.quadraticCurveTo(ox - 1.5, oy, ox - 5, oy + h/2);
  ctx.stroke();

  // Right sister fill
  ctx.beginPath();
  ctx.moveTo(ox + 5, oy - h/2);
  ctx.quadraticCurveTo(ox + 1.5, oy, ox + 5, oy + h/2);
  ctx.stroke();

  // Meiosis crossing over visualization (color swap on bottom inner chromatid tip)
  if (crossover && opposingColor) {
    ctx.save();
    // Clip to bottom-inner quadrant
    ctx.beginPath();
    if (ox < 0) {
      // Left chromosome: inner chromatid is on the right, clip bottom-right
      ctx.rect(ox, oy + 2, 25, 25);
    } else {
      // Right chromosome: inner chromatid is on the left, clip bottom-left
      ctx.rect(ox - 25, oy + 2, 25, 25);
    }
    ctx.clip();
    
    // Draw bottom inner tip in opposing color
    ctx.strokeStyle = opposingColor;
    ctx.lineWidth = 5.2;
    ctx.beginPath();
    if (ox < 0) {
      ctx.moveTo(ox + 5, oy - h/2);
      ctx.quadraticCurveTo(ox + 1.5, oy, ox + 5, oy + h/2);
    } else {
      ctx.moveTo(ox - 5, oy - h/2);
      ctx.quadraticCurveTo(ox - 1.5, oy, ox - 5, oy + h/2);
    }
    ctx.stroke();
    ctx.restore();
    
    // Draw a small crossover bridge indicator
    if (ox < 0) {
      ctx.beginPath();
      ctx.moveTo(ox + 3, oy + 3);
      ctx.lineTo(ox + 13, oy + 8);
      ctx.strokeStyle = '#2c3e50';
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }
  }

  // 3. Draw Centromere dot
  ctx.beginPath();
  ctx.arc(ox, oy, 3.8, 0, Math.PI * 2);
  ctx.fillStyle = '#ffffff';
  ctx.fill();
  ctx.lineWidth = 1.5;
  ctx.strokeStyle = '#2c3e50';
  ctx.stroke();
}

function drawSingleChromatid(ox, oy, color) {
  ctx.lineCap = 'round';
  
  // Determine backward bend direction based on motion (ox < 0 or ox > 0)
  let bend = 0;
  if (ox < -5) bend = 5;       // arms trail to the right (positive x)
  else if (ox > 5) bend = -5;  // arms trail to the left (negative x)
  
  // Outer outline
  ctx.lineWidth = 8.5;
  ctx.strokeStyle = '#2c3e50';
  ctx.beginPath();
  ctx.moveTo(ox + bend, oy - 14);
  ctx.quadraticCurveTo(ox - bend * 0.5, oy, ox + bend, oy + 14);
  ctx.stroke();

  // Inner fill
  ctx.lineWidth = 5.2;
  ctx.strokeStyle = color;
  ctx.stroke();
  
  // Centromere dot on leading edge
  ctx.beginPath();
  ctx.arc(ox - bend * 0.25, oy, 3.5, 0, Math.PI * 2);
  ctx.fillStyle = '#ffffff';
  ctx.fill();
  ctx.lineWidth = 1.5;
  ctx.strokeStyle = '#2c3e50';
  ctx.stroke();
}

function drawCallout(text, tx, ty, lx, ly, isLeft) {
  // Measure text to know badge dimensions
  ctx.font = 'bold 12px "Nunito", sans-serif';
  const tw = ctx.measureText(text).width;
  const bh = 22;
  const bw = tw + 16;
  
  // Left side: badge starts at lx, extends right. Right side: badge ends at lx, extends left.
  const bx = isLeft ? lx : lx - bw;
  const by = ly - bh / 2;
  
  // Attach point for leader line (right edge of left badge, left edge of right badge)
  const attachX = isLeft ? lx + bw : lx - bw;
  
  // 1. Draw dot at target structure
  ctx.beginPath();
  ctx.arc(tx, ty, 3.5, 0, Math.PI * 2);
  ctx.fillStyle = '#2c3e50';
  ctx.fill();
  
  // 2. Draw leader line (diagonal then straight horizontal to attachX)
  ctx.beginPath();
  ctx.moveTo(tx, ty);
  const pivotX = isLeft ? attachX + 15 : attachX - 15;
  ctx.lineTo(pivotX, ly);
  ctx.lineTo(attachX, ly);
  ctx.strokeStyle = 'rgba(44, 62, 80, 0.65)';
  ctx.lineWidth = 1.2;
  ctx.stroke();
  
  // 3. Draw white text badge
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.06)';
  ctx.shadowBlur = 4;
  ctx.shadowOffsetY = 2;
  
  ctx.beginPath();
  ctx.roundRect(bx, by, bw, bh, 5);
  ctx.fillStyle = '#ffffff';
  ctx.fill();
  ctx.shadowColor = 'transparent';
  
  ctx.lineWidth = 1.2;
  ctx.strokeStyle = '#2c3e50';
  ctx.stroke();
  
  // Draw label text
  ctx.fillStyle = '#2c3e50';
  ctx.textBaseline = 'middle';
  ctx.textAlign = 'center';
  ctx.fillText(text, bx + bw / 2, ly + 0.5);
  ctx.restore();
}

function getLabelsForStep(w, h, sc) {
  const labels = [];
  const cx = w * 0.5, cy = h * 0.5;
  const rx = sc.cellRX * w;
  const ry = sc.cellRY * h;
  
  // Plasma Membrane - always visible
  if (sc.quadSplit > 0.01) {
    labels.push({
      text: "Plasma Membrane",
      tx: cx - rx * 1.3, ty: cy - ry * 0.3,
      lx: cx - rx * 2.1, ly: cy - ry * 0.7,
      isLeft: true
    });
  } else if (sc.pinch > 0.05) {
    labels.push({
      text: "Contracting Membrane",
      tx: cx - sc.sep * w - rx * 0.4, ty: cy - ry * 0.7,
      lx: cx - rx * 1.6, ly: cy - ry * 1.0,
      isLeft: true
    });
    labels.push({
      text: "Cleavage Furrow",
      tx: cx, ty: cy - ry * (1 - sc.pinch) * 0.2,
      lx: cx - 40, ly: cy - ry - 40,
      isLeft: true
    });
  } else {
    labels.push({
      text: "Plasma Membrane",
      tx: cx - rx * 0.7, ty: cy - ry * 0.7,
      lx: cx - rx - 80, ly: cy - ry * 0.6,
      isLeft: true
    });
  }
  
  // Nuclear Envelope
  sc.nuc.forEach((n, idx) => {
    if (n.op > 0.15) {
      if (idx === 0) {
        const ncx = n.x * w, ncy = n.y * h;
        const nrx = n.rx * w, nry = n.ry * h;
        const isDegrading = (step === 1 || (mode === 'meiosis' && step === 5));
        const labelText = isDegrading ? "Nuclear Envelope (fragmenting)" : "Nuclear Envelope";
        labels.push({
          text: labelText,
          tx: ncx - nrx * 0.75, ty: ncy - nry * 0.65,
          lx: ncx - nrx - 90, ly: ncy - nry * 1.15,
          isLeft: true
        });
      }
    }
  });
  
  // Centrosome / Centrioles
  const activeCentros = sc.centro.filter(c => c.op > 0.15);
  if (activeCentros.length > 0) {
    const c = activeCentros[0];
    labels.push({
      text: "Centrosome (Centriole Pair)",
      tx: c.x * w, ty: c.y * h,
      lx: c.x * w - 60, ly: c.y * h - 50,
      isLeft: true
    });
    if (activeCentros.length > 1) {
      const c2 = activeCentros[1];
      labels.push({
        text: "Mitotic Spindle Pole",
        tx: c2.x * w, ty: c2.y * h,
        lx: c2.x * w + 60, ly: c2.y * h - 50,
        isLeft: false
      });
    }
  }
  
  // Spindles
  if (sc.centro.some(c => c.op > 0.5) && step >= 2 && step <= 4) {
    labels.push({
      text: "Spindle Fibers (Microtubules)",
      tx: cx - rx * 0.4, ty: cy - ry * 0.15,
      lx: cx - rx - 55, ly: cy + ry * 0.75,
      isLeft: true
    });
  }
  
  // Chromatin / Chromosomes
  if (step === 0) {
    const n = sc.nuc[0];
    if (n) {
      labels.push({
        text: "Chromatin (diffuse DNA threads)",
        tx: n.x * w + n.rx * w * 0.25, ty: n.y * h + n.ry * h * 0.25,
        lx: n.x * w + n.rx * w + 70, ly: n.y * h - n.ry * h * 0.6,
        isLeft: false
      });
    }
  } else {
    const visibleChroms = sc.chrom.filter(c => (c.op ?? 1) > 0.5);
    if (visibleChroms.length > 0) {
      const ch = visibleChroms[Math.floor(visibleChroms.length / 2)];
      let chromText = "Sister Chromatids";
      if (mode === 'meiosis') {
        if (step === 1) chromText = "Homologous Chromosomes (synapsed)";
        else if (step === 2) chromText = "Homologous Pairs aligned";
        else if (step === 3) chromText = "Homologous Chromosomes separating";
        else if (step === 7) chromText = "Sister Chromatids separating";
      } else {
        if (step === 2) chromText = "Chromosomes aligned at Metaphase Plate";
        else if (step === 3) chromText = "Sister Chromatids separating";
      }
      
      labels.push({
        text: chromText,
        tx: ch.x * w, ty: ch.y * h,
        lx: cx + rx + 65, ly: cy - ry * 0.35,
        isLeft: false
      });
    }
  }
  
  return labels;
}

function drawLabels(w, h, sc) {
  const rawLabels = getLabelsForStep(w, h, sc);
  
  // Clean, consistent margins: badges start 15px (mobile) or 35px (desktop) from screen edges
  const leftColX = w < 680 ? 15 : 35;
  const rightColX = w < 680 ? w - 15 : w - 35;
  
  const leftLabels = rawLabels.filter(l => l.isLeft);
  const rightLabels = rawLabels.filter(l => !l.isLeft);
  
  leftLabels.forEach(l => l.lx = leftColX);
  rightLabels.forEach(l => l.lx = rightColX);
  
  // Avoid overlaps vertically
  const spaceLabels = (list) => {
    list.sort((a, b) => a.ly - b.ly);
    const minDist = 30;
    for (let i = 1; i < list.length; i++) {
      if (list[i].ly - list[i-1].ly < minDist) {
        list[i].ly = list[i-1].ly + minDist;
      }
    }
  };
  
  spaceLabels(leftLabels);
  spaceLabels(rightLabels);
  
  leftLabels.forEach(l => drawCallout(l.text, l.tx, l.ty, l.lx, l.ly, true));
  rightLabels.forEach(l => drawCallout(l.text, l.tx, l.ty, l.lx, l.ly, false));
}

function drawScene(sc) {
  const w = window.innerWidth, h = window.innerHeight;
  drawBackground(w, h, time);
  drawPinchingCell(w, h, sc);
  sc.nuc.forEach(n => drawNucleus(w, h, n));
  drawSpindles(w, h, sc);
  sc.centro.forEach(c => drawCentrosome(w, h, c));
  sc.chrom.forEach(ch => drawChromosome(w, h, ch));
  
  // Draw Textbook Callout Labels
  drawLabels(w, h, sc);
}

/* ================================================================
   ANIMATION ENGINE
   ================================================================ */
function goToStep(newStep, instant = false) {
  const kf = keyframes();
  newStep = Math.max(0, Math.min(kf.length - 1, newStep));
  fromScene = displayScene ? cloneKF(displayScene) : cloneKF(kf[step]);
  step = newStep;
  toScene = cloneKF(kf[step]);

  if (instant) {
    animT = 1;
    displayScene = cloneKF(toScene);
    transitioning = false;
  } else {
    animT = 0;
    transitioning = true;
    transitionStart = performance.now();
  }
  updateUI();
}

function updateDisplayScene(now) {
  if (transitioning) {
    animT = Math.min(1, (now - transitionStart) / TRANSITION_MS);
    displayScene = lerpKF(fromScene, toScene, animT);
    progressFill.style.width = (animT * 100) + '%';
    if (animT >= 1) {
      transitioning = false;
      displayScene = cloneKF(toScene);
      progressFill.style.width = '100%';
      if (playing) holdTimer = now + HOLD_MS;
    }
  } else {
    displayScene = displayScene || cloneKF(keyframes()[step]);
    progressFill.style.width = playing ? '100%' : '100%';
  }
}

function tickPlay(now) {
  if (!playing || transitioning) return;
  if (holdTimer > 0 && now >= holdTimer) {
    holdTimer = 0;
    if (step < keyframes().length - 1) goToStep(step + 1);
    else stopPlayback();
  }
}

function frame(now) {
  time = now;
  updateDisplayScene(now);
  tickPlay(now);
  if (displayScene) drawScene(displayScene);
  requestAnimationFrame(frame);
}

/* ================================================================
   UI
   ================================================================ */
function updateUI() {
  const m = meta();
  const cur = m[step];
  const kf = keyframes();

  phaseName.textContent = cur.name;
  phaseSub.textContent = cur.sub;
  infoPanel.innerHTML = cur.info;
  stepCounter.textContent = `${step + 1} / ${kf.length}`;
  btnPrev.disabled = step === 0;
  btnNext.textContent = step === kf.length - 1 ? 'Done ✓' : 'Next ▶';

  stageBar.innerHTML = '';
  m.forEach((st, i) => {
    const dot = document.createElement('div');
    dot.className = 'stage-dot' + (i === step ? ' active' : i < step ? ' done' : '');
    dot.title = st.name;
    dot.addEventListener('click', () => { stopPlayback(); goToStep(i); });
    stageBar.appendChild(dot);
  });
}

function updatePlayButton() {
  btnPlay.textContent = playing ? '⏸ Pause' : '▶ Play';
  btnPlay.classList.toggle('playing', playing);
}

function stopPlayback() {
  playing = false;
  holdTimer = 0;
  updatePlayButton();
}

function startPlayback() {
  if (step >= keyframes().length - 1) goToStep(0, false);
  playing = true;
  updatePlayButton();
  if (!transitioning) holdTimer = performance.now() + HOLD_MS;
}

function togglePlay() {
  if (playing) stopPlayback();
  else startPlayback();
}

function next() {
  stopPlayback();
  if (step < keyframes().length - 1) goToStep(step + 1);
}

function prev() {
  stopPlayback();
  if (step > 0) goToStep(step - 1);
}

function reset() {
  stopPlayback();
  goToStep(0, false);
}

function setMode(m) {
  stopPlayback();
  mode = m;
  document.querySelectorAll('.mode-tab').forEach(t => t.classList.toggle('active', t.dataset.mode === m));
  displayScene = null;
  goToStep(0, true);
}

/* ================================================================
   EVENTS
   ================================================================ */
btnPlay.addEventListener('click', togglePlay);
btnNext.addEventListener('click', next);
btnPrev.addEventListener('click', prev);
document.getElementById('btn-reset').addEventListener('click', reset);
document.querySelectorAll('.mode-tab').forEach(t => t.addEventListener('click', () => setMode(t.dataset.mode)));

document.addEventListener('keydown', e => {
  if (e.key === ' ') { e.preventDefault(); togglePlay(); }
  if (e.key === 'ArrowRight') { e.preventDefault(); next(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); prev(); }
});

window.addEventListener('resize', resize);

/* Init */
resize();
displayScene = cloneKF(keyframes()[0]);
updateUI();
requestAnimationFrame(frame);
</script>
